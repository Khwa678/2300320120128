<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Notification App Frontend</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 20px; }
    button { margin-right: 10px; }
    textarea { width: 100%; height: 120px; margin-top: 10px; }
    .log { white-space: pre-wrap; background: #f5f5f5; padding: 10px; border-radius: 6px; }
  </style>
</head>
<body>
  <h1>Notification App Frontend</h1>
  <p>Calls the backend at <code>http://localhost:4100</code> and shows responses.</p>

  <button id="healthBtn">Health Check</button>
  <button id="listBtn">Get Notifications</button>
  <button id="createBtn">Create Notification</button>
  <button id="errorBtn">Simulate Error</button>
  <button id="evalLogBtn">Send Evaluation Log</button>

  <textarea id="output" readonly class="log"></textarea>

  <script>
    const output = document.getElementById('output');
    const baseUrl = 'http://localhost:4100';

    function log(message) {
      output.textContent = `${new Date().toISOString()} - ${message}\n` + output.textContent;
    }

    async function callApi(path, options) {
      try {
        const response = await fetch(`${baseUrl}${path}`, options);
        const body = await response.json();
        log(`REQUEST ${options?.method || 'GET'} ${path} => ${response.status}`);
        log(JSON.stringify(body, null, 2));
      } catch (err) {
        log(`ERROR ${path}: ${err.message}`);
      }
    }

    document.getElementById('healthBtn').addEventListener('click', () => callApi('/health'));
    document.getElementById('listBtn').addEventListener('click', () => callApi('/notifications'));
    document.getElementById('createBtn').addEventListener('click', () => callApi('/notifications', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: 'New notification from frontend', severity: 'info' }),
    }));
    document.getElementById('errorBtn').addEventListener('click', () => callApi('/notifications/error'));
    document.getElementById('evalLogBtn').addEventListener('click', () => {
      const body = {
        stack: 'backend',
        level: 'error',
        package: 'handler',
        message: 'received string, expected bool',
      };
      callApi('/evaluation-service/logs', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': 'Bearer default-eval-key',
        },
        body: JSON.stringify(body),
      });
    });
  </script>
</body>
</html>
